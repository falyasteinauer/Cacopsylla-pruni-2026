<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Carte 3D Psylles - Falya STEINAUER</title>
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<style type="text/css">
body { margin: 0; padding: 0; background: #f0f0f0; font-family: Arial, sans-serif; }
#view { width: 100vw; height: 100vh; position: relative; }
#legend {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid #333;
    border-radius: 8px;
    padding: 15px;
    font-family: Arial, sans-serif;
    font-size: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 1000;
    min-width: 200px;
}
#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    color: #333;
}
</style>
 
<!-- Chargement de three.js depuis CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
 
<div id="view">
  <div id="loading">🔄 Chargement de votre magnifique carte 3D...</div>
</div>
 
<!-- LÉGENDE -->
<div id="legend">
    <h3 style="margin-top: 0; color: #333; font-size: 14px;">Légende</h3>
    
    <!-- Zones -->
    <div style="margin-bottom: 10px;">
        <strong>Zones :</strong><br>
        <div style="margin: 3px 0;">
            <span style="background: #DC143C; width: 15px; height: 15px; display: inline-block; margin-right: 8px;"></span>
            Zone A
        </div>
        <div style="margin: 3px 0;">
            <span style="background: #4169E1; width: 15px; height: 15px; display: inline-block; margin-right: 8px;"></span>
            Zone B
        </div>
        <div style="margin: 3px 0;">
            <span style="background: #32CD32; width: 15px; height: 15px; display: inline-block; margin-right: 8px;"></span>
            Zone C
        </div>
    </div>
 
    <!-- Barres de captures -->
    <div style="margin-bottom: 10px;">
        <strong>Barres de captures :</strong><br>
        <div style="margin: 3px 0;">
            <span style="background: #000000; width: 15px; height: 15px; display: inline-block; margin-right: 8px;"></span>
            Prunellier
        </div>
    </div>
 
    <!-- Zones boisées -->
    <div style="margin-bottom: 10px;">
        <strong>Zones boisées :</strong><br>
        <div style="margin: 3px 0;">
            <span style="background: #8A2BE2; width: 15px; height: 15px; display: inline-block; margin-right: 8px;"></span>
            Conifères sauf pins à crochets
        </div>
        <div style="margin: 3px 0;">
            <span style="background: #FF8C00; width: 15px; height: 15px; display: inline-block; margin-right: 8px;"></span>
            Abricotiers
        </div>
    </div>
 
    <!-- Sources -->
    <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid #ccc; font-size: 10px; color: #666;">
        <strong>Sources :</strong><br>
        Cartographie réalisée par <strong>Falya STEINAUER</strong><br>
        Données forestières : BD FORET v1.0 - © IGN
    </div>
 
    <!-- Bouton pour masquer -->
    <button onclick="toggleLegend()" style="
        position: absolute;
        top: 5px;
        right: 5px;
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
    ">×</button>
</div>
 
<script>
console.log('🚀 Début du chargement...');
 
// Chargement dynamique de VOS données depuis GitHub
function chargerDonnees() {
    let partiesChargees = 0;
    const totalParties = 9;
    let donnees = [];
    
    console.log('📦 Chargement des 9 parties de données...');
    
    for (let i = 1; i <= totalParties; i++) {
        fetch('./scene_partie_' + i + '.js')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Partie ' + i + ' introuvable');
                }
                return response.text();
            })
            .then(data => {
                console.log('✅ Partie ' + i + ' chargée');
                donnees[i-1] = data;
                partiesChargees++;
                
                if (partiesChargees === totalParties) {
                    console.log('🎉 Toutes les parties chargées !');
                    // Combiner toutes les parties
                    const sceneComplete = donnees.join('\n');
                    
                    // Exécuter le code de scene
                    try {
                        eval(sceneComplete);
                        console.log('🎯 Données traitées, création de la carte...');
                        creerCarte3D();
                    } catch (error) {
                        console.error('❌ Erreur dans les données:', error);
                        document.getElementById('loading').innerHTML = '❌ Erreur dans les données de la carte';
                    }
                }
            })
            .catch(error => {
                console.error('❌ Erreur partie ' + i + ':', error);
                document.getElementById('loading').innerHTML = '❌ Erreur de chargement partie ' + i;
            });
    }
}
 
// Créer une carte 3D basique si les données se chargent bien
function creerCarte3D() {
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87CEEB); // Couleur ciel
    
    // Remplacer le div loading
    const viewDiv = document.getElementById('view');
    viewDiv.innerHTML = '';
    viewDiv.appendChild(renderer.domElement);
    
    // Contrôles de navigation
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.25;
    
    // Lumière
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(0, 10, 5);
    scene.add(light);
    
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    
    // Exemple de terrain simple en attendant vos données
    const geometry = new THREE.PlaneGeometry(100, 100, 32, 32);
    const material = new THREE.MeshLambertMaterial({ color: 0x90EE90, wireframe: false });
    const terrain = new THREE.Mesh(geometry, material);
    terrain.rotation.x = -Math.PI / 2;
    scene.add(terrain);
    
    // Exemples de cylindres (vos barres de capture)
    const cylindreGeometry = new THREE.CylinderGeometry(2, 2, 20, 8);
    const cylindreMaterial = new THREE.MeshLambertMaterial({ color: 0x8B1A8B });
    
    for (let i = 0; i < 5; i++) {
        const cylindre = new THREE.Mesh(cylindreGeometry, cylindreMaterial);
        cylindre.position.set(
            (Math.random() - 0.5) * 80,
            10,
            (Math.random() - 0.5) * 80
        );
        scene.add(cylindre);
    }
    
    // Position caméra
    camera.position.set(50, 30, 50);
    camera.lookAt(0, 0, 0);
    
    // Animation
    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }
    
    animate();
    console.log('🎉 Carte 3D créée avec succès !');
}
 
// Fonction légende
function toggleLegend() {
    const legend = document.getElementById('legend');
    if (legend.style.display === 'none') {
        legend.style.display = 'block';
    } else {
        legend.style.display = 'none';
    }
}
 
// Redimensionnement
window.addEventListener('resize', function() {
    if (window.camera && window.renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
});
 
// Démarrer le chargement
chargerDonnees();
</script>
</body>
</html>
